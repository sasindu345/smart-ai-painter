services:
  frontend:
    image: ghcr.io/${GHCR_OWNER}/smart-ai-painter-frontend:latest
    restart: unless-stopped
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0

  backend:
    image: ghcr.io/${GHCR_OWNER}/smart-ai-painter-backend:latest
    restart: unless-stopped
    environment:
      APP_NAME: Smart AI Painter API
      AI_MODE: ${AI_MODE:-mock}
      HF_API_TOKEN: ${HF_API_TOKEN:-}
      HF_MODEL_ID: ${HF_MODEL_ID:-stabilityai/stable-diffusion-xl-base-1.0}
      HF_TIMEOUT_SECONDS: ${HF_TIMEOUT_SECONDS:-120}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-generated-images}
      ALLOWED_ORIGINS: https://${APP_DOMAIN},https://www.${APP_DOMAIN}

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    command: >
      /bin/sh -c
      "envsubst '$$APP_DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
