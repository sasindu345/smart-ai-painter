name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Normalize image owner
        id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner_lc }}/smart-ai-painter-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://${{ secrets.APP_DOMAIN }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner_lc }}/smart-ai-painter-backend:latest

      - name: Prepare remote directories
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR=/opt/smart-ai-painter; fi
            mkdir -p "$APP_DIR/infra/nginx" "$APP_DIR/infra/scripts"

      - name: Upload production infra files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "infra/docker-compose.prod.yml,infra/nginx/nginx.conf,infra/scripts/deploy.sh"
          target: /tmp/smart-ai-painter-release

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR=/opt/smart-ai-painter; fi

            mkdir -p "$APP_DIR/infra/nginx" "$APP_DIR/infra/scripts"
            cp /tmp/smart-ai-painter-release/infra/docker-compose.prod.yml "$APP_DIR/infra/docker-compose.prod.yml"
            cp /tmp/smart-ai-painter-release/infra/nginx/nginx.conf "$APP_DIR/infra/nginx/nginx.conf"
            cp /tmp/smart-ai-painter-release/infra/scripts/deploy.sh "$APP_DIR/infra/scripts/deploy.sh"
            chmod +x "$APP_DIR/infra/scripts/deploy.sh"

            cat > "$APP_DIR/.env.prod" <<EOF
GHCR_OWNER=${{ steps.vars.outputs.owner_lc }}
APP_DOMAIN=${{ secrets.APP_DOMAIN }}
AI_MODE=${{ secrets.AI_MODE }}
HF_API_TOKEN=${{ secrets.HF_API_TOKEN }}
HF_MODEL_ID=${{ secrets.HF_MODEL_ID }}
HF_TIMEOUT_SECONDS=${{ secrets.HF_TIMEOUT_SECONDS }}
SUPABASE_URL=${{ secrets.SUPABASE_URL }}
SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}
SUPABASE_STORAGE_BUCKET=${{ secrets.SUPABASE_STORAGE_BUCKET }}
EOF

            APP_DIR="$APP_DIR" \
            GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}" \
            GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}" \
            "$APP_DIR/infra/scripts/deploy.sh"
