name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Normalize image owner
        id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner_lc }}/smart-ai-painter-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://${{ secrets.APP_DOMAIN }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner_lc }}/smart-ai-painter-backend:latest

      - name: Validate production secrets
        run: |
          set -e
          check_required() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ] || [ "$value" = "-" ]; then
              echo "::error title=Invalid secret::${name} is empty or set to '-'"
              exit 1
            fi
          }

          check_required "APP_DOMAIN" "${{ secrets.APP_DOMAIN }}"
          check_required "HF_API_TOKEN" "${{ secrets.HF_API_TOKEN }}"
          check_required "HF_MODEL_ID" "${{ secrets.HF_MODEL_ID }}"
          check_required "SUPABASE_URL" "${{ secrets.SUPABASE_URL }}"
          check_required "SUPABASE_SERVICE_ROLE_KEY" "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          check_required "SUPABASE_JWT_SECRET" "${{ secrets.SUPABASE_JWT_SECRET }}"
          check_required "SUPABASE_STORAGE_BUCKET" "${{ secrets.SUPABASE_STORAGE_BUCKET }}"

      - name: Prepare remote directories
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR=/opt/smart-ai-painter; fi
            mkdir -p "$APP_DIR/infra/nginx" "$APP_DIR/infra/scripts"

      - name: Upload production infra files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "infra/docker-compose.prod.yml,infra/nginx/nginx.conf,infra/scripts/deploy.sh"
          target: /tmp/smart-ai-painter-release

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR=/opt/smart-ai-painter; fi

            mkdir -p "$APP_DIR/infra/nginx" "$APP_DIR/infra/scripts"
            cp /tmp/smart-ai-painter-release/infra/docker-compose.prod.yml "$APP_DIR/infra/docker-compose.prod.yml"
            cp /tmp/smart-ai-painter-release/infra/nginx/nginx.conf "$APP_DIR/infra/nginx/nginx.conf"
            cp /tmp/smart-ai-painter-release/infra/scripts/deploy.sh "$APP_DIR/infra/scripts/deploy.sh"
            chmod +x "$APP_DIR/infra/scripts/deploy.sh"

            {
              echo "GHCR_OWNER=${{ steps.vars.outputs.owner_lc }}"
              echo "APP_DOMAIN=${{ secrets.APP_DOMAIN }}"
              echo "AI_MODE=${{ secrets.AI_MODE }}"
              echo "HF_API_TOKEN=${{ secrets.HF_API_TOKEN }}"
              echo "HF_MODEL_ID=${{ secrets.HF_MODEL_ID }}"
              echo "HF_TIMEOUT_SECONDS=${{ secrets.HF_TIMEOUT_SECONDS }}"
              echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
              echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
              echo "SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}"
              echo "SUPABASE_STORAGE_BUCKET=${{ secrets.SUPABASE_STORAGE_BUCKET }}"
            } > "$APP_DIR/.env.prod"

            APP_DIR="$APP_DIR" \
            GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}" \
            GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}" \
            "$APP_DIR/infra/scripts/deploy.sh"

      - name: Notify on deployment failure
        if: ${{ failure() }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "## Deployment failed" >> "$GITHUB_STEP_SUMMARY"
          echo "Repository: ${{ github.repository }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Run: $RUN_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "::error title=Production deployment failed::See $RUN_URL"

          if [ -n "${{ secrets.DEPLOY_WEBHOOK_URL }}" ]; then
            curl -sS -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"Deploy failed for ${{ github.repository }} on ${{ github.ref_name }}. Run: $RUN_URL\"}" \
              || true
          fi
