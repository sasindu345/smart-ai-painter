name: Production Diagnostics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Run diagnostics on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR=/opt/smart-ai-painter; fi

            ENV_FILE="$APP_DIR/.env.prod"
            COMPOSE_FILE="$APP_DIR/infra/docker-compose.prod.yml"

            echo "== App paths =="
            echo "APP_DIR=$APP_DIR"
            echo "ENV_FILE=$ENV_FILE"
            echo "COMPOSE_FILE=$COMPOSE_FILE"

            echo "== Effective env (non-secret keys only) =="
            grep -E "^(AI_MODE|HF_MODEL_ID|SUPABASE_STORAGE_BUCKET|APP_DOMAIN)=" "$ENV_FILE" || true

            echo "== Compose services =="
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps

            echo "== Backend package versions inside container =="
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" exec -T backend python -c "import supabase,storage3,postgrest; print('supabase', supabase.__version__); print('storage3', storage3.__version__); print('postgrest', postgrest.__version__)"

            echo "== Active upload function source in running container =="
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" exec -T backend python -c "import inspect; from app.api.v1.routes import sketches; print(inspect.getsource(sketches._upload_with_bucket_retry))"

            echo "== Recent backend logs =="
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" logs --tail=200 backend
